<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Çevrimdışısınız — Webey</title>
  <link rel="icon" href="img/favicon.ico"/>
  <style>
    :root { --teal:#0ea5b3; --teal-d:#0b8a96; }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0 }
    body {
      font-family: Inter, system-ui, sans-serif;
      background: #f8fafc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 48px 40px;
      text-align: center;
      max-width: 440px;
      width: 100%;
      box-shadow: 0 8px 40px rgba(0,0,0,.08);
    }
    .icon {
      width: 80px; height: 80px;
      background: linear-gradient(135deg, #e0f7fa, #b2ebf2);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
      font-size: 36px;
    }
    .logo {
      font-size: 15px; font-weight: 700;
      color: var(--teal);
      letter-spacing: .5px;
      margin-bottom: 32px;
      display: block;
    }
    h1 { font-size: 22px; color: #1a1a2e; margin-bottom: 12px; }
    p  { color: #6b7280; font-size: 15px; line-height: 1.6; margin-bottom: 8px; }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 13px 28px;
      background: var(--teal);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 15px; font-weight: 600;
      cursor: pointer;
      margin-top: 28px;
      transition: .2s;
      text-decoration: none;
    }
    .btn:hover { background: var(--teal-d); transform: translateY(-1px); }
    .status {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 13px; color: #9ca3af;
      margin-top: 20px;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #ef4444;
      animation: pulse 1.5s infinite;
    }
    .dot.online { background: #22c55e; animation: none; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: .4; }
    }
    .tips {
      background: #f8f9fa;
      border-radius: 12px;
      padding: 16px;
      margin-top: 24px;
      text-align: left;
    }
    .tips h3 { font-size: 13px; color: #374151; margin-bottom: 8px; font-weight: 600; }
    .tips li  { font-size: 13px; color: #6b7280; margin-bottom: 6px; padding-left: 4px; }
    .tips ul  { padding-left: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <span class="logo">● Webey</span>
    <div class="icon">📡</div>
    <h1>İnternet bağlantısı yok</h1>
    <p>Randevularınızı görmek ve yönetmek için internet bağlantısına ihtiyaç duyuyoruz.</p>

    <div class="tips">
      <h3>Şunları deneyebilirsiniz:</h3>
      <ul>
        <li>Wi-Fi bağlantınızı kontrol edin</li>
        <li>Uçak modunu kapatın</li>
        <li>Mobil veri bağlantınızı açın</li>
        <li>Sayfayı yenilemeyi deneyin</li>
      </ul>
    </div>

    <button class="btn" onclick="tryReconnect()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      Tekrar Dene
    </button>

    <div class="status">
      <span class="dot" id="statusDot"></span>
      <span id="statusText">Çevrimdışı</span>
    </div>
  </div>

  <script>
    function updateStatus() {
      const dot  = document.getElementById('statusDot');
      const text = document.getElementById('statusText');
      if (navigator.onLine) {
        dot.classList.add('online');
        text.textContent = 'Bağlantı var — yönlendiriliyor...';
        setTimeout(() => window.history.back(), 1000);
      } else {
        dot.classList.remove('online');
        text.textContent = 'Çevrimdışı';
      }
    }

    function tryReconnect() {
      updateStatus();
      if (!navigator.onLine) {
        const btn = document.querySelector('.btn');
        btn.textContent = 'Bağlantı yok, tekrar dene';
        setTimeout(() => { btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg> Tekrar Dene'; }, 2000);
      }
    }

    window.addEventListener('online',  updateStatus);
    window.addEventListener('offline', updateStatus);
    updateStatus();
  </script>
</body>
</html>
