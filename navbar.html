<!-- navbar.html (sabit siyah navbar, dark-mode uyumlu) -->
<style>
  :root{
    --nav-height:64px;
    --ring:#93c5fd;
    --nav-bg:#000;                /* HER ZAMAN SİYAH */
    --nav-accent:#0ea5b3;
    --nav-accent-hover:#0a8f9e;

    /* List button temaları (Ana Sayfa vb.) */
    --list-btn-bg-light:#fff;     /* açık: beyaz zemin  */
    --list-btn-ink-light:#000;    /* açık: siyah yazı   */
    --list-btn-bg-dark:#0b0c10;   /* koyu: siyah zemin  */
    --list-btn-ink-dark:#fff;     /* koyu: beyaz yazı   */
  }

  html{ color-scheme: light dark; }

  :where(.navbar a,.navbar button,.navbar .list-btn,.navbar .profile):focus-visible{
    outline:2px solid var(--ring);
    outline-offset:2px;
    border-radius:12px;
  }

  .navbar{
    position:fixed; inset:0 0 auto 0; height:var(--nav-height);
    padding:12px max(40px, env(safe-area-inset-right)) 12px max(40px, env(safe-area-inset-left));
    display:flex; align-items:center; justify-content:space-between;
    background:var(--nav-bg); color:#fff; box-shadow:0 4px 10px rgba(0,0,0,.18); z-index:999;
    border-bottom:1px solid rgba(255,255,255,.08);
    opacity:1; transform:translateY(0);
    transition:background .3s ease, border-color .3s ease;
    -webkit-backdrop-filter:saturate(1.1) blur(8px); backdrop-filter:saturate(1.1) blur(8px);
  }

  .logo-text{ font-size:24px; font-weight:600; cursor:pointer; color:#fff; background:transparent; border:0; padding:0; }
  .logo-text:hover{ transform:scale(1.05) }

  .search-section{ flex:1; display:flex; align-items:center; justify-content:center; gap:12px; margin:0 40px; max-width:680px; min-width:0; }

  .search-section .search-box{
    display:flex; align-items:center; gap:8px; min-width:180px; height:44px; padding:10px 16px;
    background:#fff; border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,.06)
  }
  .search-section .search-box i{ color:#888; font-size:16px }
  .search-section .search-box input{ flex:1; border:none; outline:none; background:transparent; font-size:14px; color:#333 }

  .right-section{ display:flex; align-items:center; gap:12px; }

  /* ---- LIST-BTN (Ana Sayfa / İşletmeni Listele) ----
     Dış CSS'teki ".navbar a {color:#fff !important}" kuralını ezmek için
     daha spesifik ve !important kullanıyoruz. */
  #mainNavbar .list-btn,
  #mainNavbar .list-btn:link,
  #mainNavbar .list-btn:visited{
    background:var(--list-btn-bg-light) !important;
    color:var(--list-btn-ink-light) !important;
    border:1px solid rgba(0,0,0,.10) !important;
    padding:10px 16px; border-radius:8px; font-size:14px; font-weight:600;
    text-decoration:none !important;
    box-shadow:0 2px 8px rgba(0,0,0,.12);
    transition:background-color .25s, color .25s, border-color .25s, box-shadow .25s;
  }
  #mainNavbar .list-btn:hover{ background:#f1f2f4 !important; }

  /* Primary CTA */
  .btn-primary{
    padding:10px 18px; border:none; border-radius:8px; font-size:14px; font-weight:700;
    background:var(--brand, var(--nav-accent)); color:#fff; text-decoration:none !important;
    box-shadow:0 6px 18px rgba(0,0,0,.15);
  }
  .btn-primary:hover{ filter:brightness(.95) }

  /* Koyu tema uyarlamaları */
  @media (prefers-color-scheme: dark){
    #mainNavbar .list-btn,
    #mainNavbar .list-btn:link,
    #mainNavbar .list-btn:visited{
      background:var(--list-btn-bg-dark) !important;   /* siyah zemin  */
      color:var(--list-btn-ink-dark) !important;       /* beyaz yazı   */
      border-color:#2a2f38 !important;
      box-shadow:0 0 0 1px rgba(255,255,255,.06) inset, 0 8px 18px rgba(0,0,0,.40);
    }
    #mainNavbar .list-btn:hover{ background:#111418 !important; }

    .search-section .search-box{
      background:#1a1c22; box-shadow:0 2px 6px rgba(0,0,0,.35)
    }
    .search-section .search-box i{ color:#a8adb5 }
    .search-section .search-box input{ color:#e8eaed }
  }

  .has-fixed-navbar{ padding-top:calc(var(--nav-height) + env(safe-area-inset-top)) }

  @media (prefers-reduced-motion: reduce){
    .logo-text{ transition:none }
  }
  @media (max-width:768px){
    .search-section{ display:none }
    .navbar{ padding-left:max(16px, env(safe-area-inset-left)); padding-right:max(16px, env(safe-area-inset-right)) }
    .right-section{ gap:10px }
    .list-btn,.btn-primary{ padding:8px 12px; font-size:13px }
    .logo-text{ font-size:20px }
  }

  /* ---- user-profile.html için minimal görünüm ---- */
  .nav-minimal .search-section{ display:none !important; }
  .nav-minimal .profile{ display:none !important; }
  .nav-minimal #btnListBusiness{ display:none !important; }
  .nav-minimal .right-section{ margin-left:auto; }

  /* ════════════════════════════════════════════════════
     MOBİL NAVBAR — generic sayfalar (arama kutusu yok)
     kuafor.html kendi mob-search satırlarını kendi ekler.
     ════════════════════════════════════════════════════ */

  /* Desktop'ta mobile-navbar gizli */
  .mobile-navbar { display: none; }

  @media (max-width: 767px) {
    /* Desktop nav gizle */
    .navbar { display: none !important; }

    /* ── Navbar kapsayıcı ── */
    .mobile-navbar {
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 999;
      background: linear-gradient(160deg, #0a1a1c 0%, #0d2325 60%, #0a2020 100%);
      border-bottom: 1px solid rgba(14,165,179,.18);
      padding-bottom: 10px;
    }

    /* ── EXPANDED bölüm ── */
    .mob-expanded {
      overflow: hidden;
      max-height: 200px;
      opacity: 1;
      transition: max-height .32s ease, opacity .25s ease;
    }

    /* Satır 1: İşletmeni Listele */
    .mob-top-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px 16px 0;
    }
    .mob-list-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: rgba(255,255,255,.80);
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      letter-spacing: .01em;
      transition: color .15s;
    }
    .mob-list-btn:hover { color: #fff; }
    .mob-list-btn i { font-size: 11px; opacity: .7; }

    /* Satır 2: Logo */
    .mob-logo-row {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4px 16px 0;
    }
    .mob-logo-row .logo-text {
      font-size: 30px !important;
      color: #fff !important;
      text-decoration: none !important;
    }

    /* ── COMPACT satır (her zaman görünür) ── */
    .mob-compact-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px 0;
    }

    /* Compact logo: JS ile gösterilir/gizlenir */
    .mob-compact-logo {
      font-size: 20px !important;
      color: #fff !important;
      text-decoration: none !important;
      flex-shrink: 0;
      white-space: nowrap;
      max-width: 0;
      overflow: hidden;
      opacity: 0;
      transition: max-width .30s ease, opacity .25s ease;
    }

    /* Compact sağ köşe: auth butonu (isteğe bağlı) */
    .mob-compact-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .mob-compact-right .mob-auth-btn {
      background: rgba(255,255,255,.10);
      border: none;
      border-radius: 50%;
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      transition: background .15s;
    }
    .mob-compact-right .mob-auth-btn:hover { background: rgba(255,255,255,.18); }

    /* Sayfa içeriğini navbar altına it */
    body.has-mobile-navbar main,
    body.has-mobile-navbar .page-body,
    body.has-mobile-navbar .detail-wrap {
      padding-top: calc(var(--mob-navbar-h, 120px) + 8px) !important;
    }
  }
</style>

<!-- ═══════════════════════════════════════════════════════════
     MOBİL NAVBAR HTML — kuafor.html ile birebir aynı yapı
     ═══════════════════════════════════════════════════════════ -->
<div class="mobile-navbar" id="mobileNavbar" aria-label="Mobil ana menü">

  <!-- EXPANDED: sadece en üstteyken görünür -->
  <div class="mob-expanded" id="mobExpanded">
    <!-- Satır 1: İşletmeni Listele -->
    <div class="mob-top-bar">
      <a href="isletmeni-listele.html" class="mob-list-btn">
        İşletmeni Listele <i class="fas fa-arrow-right" aria-hidden="true"></i>
      </a>
    </div>
    <!-- Satır 2: Logo -->
    <div class="mob-logo-row">
      <a href="index.html" class="logo-text" aria-label="Ana sayfa">Webey</a>
    </div>
    <!-- Satır 3: Neresi? + Kuaför ara -->
    <div class="mob-search-area mob-extra-search" role="search">
      <div class="mob-search-row">
        <div class="mob-search-box mob-search-loc">
          <i class="fas fa-map-marker-alt" aria-hidden="true"></i>
          <input id="qLocMobileNav" type="text" placeholder="Neresi?" aria-label="Konum" autocomplete="off"/>
        </div>
        <a href="kuafor.html" class="mob-search-box mob-when-box" aria-label="Kuaförleri listele">
          <i class="fas fa-search" aria-hidden="true"></i>
          <span class="mob-when-text">Kuaför ara</span>
        </a>
      </div>
    </div>
  </div>

  <!-- COMPACT: scroll sonrası tek satır -->
  <div class="mob-compact-row">
    <a href="index.html" class="mob-compact-logo logo-text" aria-label="Ana sayfa">Webey</a>
    <div class="mob-search-box mob-search-main" role="search">
      <i class="fas fa-search" aria-hidden="true"></i>
      <input id="qSvcMobileNav" type="text" placeholder="Hizmet veya işletme ara" aria-label="Hizmet veya işletme ara" autocomplete="off"/>
    </div>
  </div>

</div>

<nav class="navbar" id="mainNavbar" role="navigation" aria-label="Birincil">
  <button class="logo-text" id="logoBtn" type="button" aria-label="Anasayfaya dön">WeBey</button>

  <div class="search-section" role="search">
    <div class="search-box">
      <i class="fas fa-search" aria-hidden="true"></i>
      <input id="navQuery" type="text" placeholder="Hizmet veya işletme ara" aria-label="Hizmet veya işletme ara" />
    </div>
    <div class="search-box">
      <i class="fas fa-map-marker-alt" aria-hidden="true"></i>
      <input id="navLoc" type="text" placeholder="Neresi?" aria-label="Konum" />
    </div>
    <div class="search-box">
      <i class="fas fa-clock" aria-hidden="true"></i>
      <input id="whenNavInput" data-when-label type="text" placeholder="Ne zaman?" aria-label="Zaman" readonly />
    </div>
  </div>

  <div class="right-section">
    <a id="btnHome" class="list-btn" href="index.html">Ana Sayfa</a>
    <a id="listAllBtn" class="btn-primary" href="kuafor.html">Tüm Kuaförleri Listele</a>

    <button class="profile open-auth" type="button" data-profile-btn style="display:none">
      <i class="fas fa-user-circle" aria-hidden="true"></i>
      <span class="auth-text">Giriş Yap / Kayıt Ol</span>
    </button>
    <a id="btnListBusiness" href="isletmeni-listele.html" class="list-btn" style="display:none">İşletmeni Listele</a>
  </div>
</nav>

<script type="module">
  (() => {
    const hero = document.getElementById("heroSec");

    /* Yalnız user-profile.html’de minimal mod */
    const isUserProfile = /(^|\/)user-profile\.html$/i.test(location.pathname);
    if (isUserProfile) document.documentElement.classList.add("nav-minimal");

    /* NAVBAR SABİT & SİYAH — scroll/observer yok */
    if (!hero) document.body.classList.add("has-fixed-navbar");

    /* Mobil navbar için padding-top class */
    if (window.innerWidth <= 767 || window.matchMedia('(max-width:767px)').matches) {
      document.body.classList.add("has-mobile-navbar");
    }

    // Logo → her zaman anasayfa
    document.getElementById("logoBtn")?.addEventListener("click", ()=>{ location.href="index.html"; });

    // Arama (profilde gizli; diğer sayfalarda Enter ile kuafor.html’e gidiş)
    const qEl   = document.getElementById("navQuery");
    const locEl = document.getElementById("navLoc");
    const whenEl= document.getElementById("whenNavInput");

    function goSearch(){
      const url = new URL("kuafor.html", location.origin);
      const q = (qEl?.value || "").trim();
      const loc = (locEl?.value || "").trim();
      const when = whenEl?.dataset?.whenIso || "";
      if (q)   url.searchParams.set("q", q);
      if (loc) url.searchParams.set("loc", loc);
      if (when)url.searchParams.set("when", when);
      location.href = url.pathname + (url.search || "");
    }
    qEl?.addEventListener("keydown", e => { if(e.key==="Enter") goSearch(); });
    locEl?.addEventListener("keydown", e => { if(e.key==="Enter") goSearch(); });

    // Zaman için native fallback
    function two(n){ return String(n).padStart(2,"0"); }
    function toLocalIso(dt){ return `${dt.getFullYear()}-${two(dt.getMonth()+1)}-${two(dt.getDate())}T${two(dt.getHours())}:${two(dt.getMinutes())}`; }
    function toLabel(dt){ return `${two(dt.getDate())}.${two(dt.getMonth()+1)}.${dt.getFullYear()} ${two(dt.getHours())}:${two(dt.getMinutes())}`; }
    async function openNativeWhenPicker(anchor){
      if (window.whenPicker?.open) { try{ window.whenPicker.open(anchor); return; }catch{} }
      const inp = document.createElement("input");
      inp.type="datetime-local"; inp.style.position="fixed"; inp.style.left="-9999px";
      inp.min = toLocalIso(new Date());
      document.body.appendChild(inp);
      inp.addEventListener("change", ()=>{
        if (!inp.value) { document.body.removeChild(inp); return; }
        const dt = new Date(inp.value.replace("T"," ") + ":00");
        if (anchor){ anchor.value = toLabel(dt); anchor.dataset.whenIso = dt.toISOString(); }
        document.body.removeChild(inp);
      }, { once:true });
      inp.focus(); inp.click();
    }
    whenEl?.addEventListener("click", e => { e.preventDefault(); openNativeWhenPicker(whenEl); });
    whenEl?.addEventListener("keydown", e => { if(e.key==="Enter"||e.key===" "){ e.preventDefault(); openNativeWhenPicker(whenEl); }});

    try { document.dispatchEvent(new Event("navbar:ready")); } catch {}
  })();
</script>

<!-- Mobil navbar: compact arama yönlendirme -->
<script>
(function() {
  function initNavSearch() {
    var qSvc = document.getElementById('qSvcMobileNav');
    var qLoc = document.getElementById('qLocMobileNav');
    function goSearch() {
      var url = new URL('kuafor.html', location.origin);
      var q   = (qSvc && qSvc.value.trim()) || '';
      var loc = (qLoc && qLoc.value.trim()) || '';
      if (q)   url.searchParams.set('q', q);
      if (loc) url.searchParams.set('loc', loc);
      location.href = url.pathname + (url.search || '');
    }
    if (qSvc) qSvc.addEventListener('keydown', function(e) { if (e.key === 'Enter') goSearch(); });
    if (qLoc) qLoc.addEventListener('keydown', function(e) { if (e.key === 'Enter') goSearch(); });
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', initNavSearch);
  else initNavSearch();
})();
</script>
