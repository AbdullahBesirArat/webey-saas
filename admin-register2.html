<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content"/>
  <meta name="robots" content="noindex,nofollow"/>
  <meta name="theme-color" content="#F0EFE9">
  <title>Yönetici Kaydı – Hakkınızda</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer"/>
  <style>

  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap');
  :root {
    --bg: #F0EFE9; --card: #FFFFFF; --text: #0D0C0A; --muted: #78716C;
    --border: #E7E5DF; --input-bg: #FAFAF8;
    --accent: #4338CA; --accent-bg: #EEF2FF;
    --on: #16A34A; --on-bg: #DCFCE7;
    --danger: #DC2626; --danger-bg: #FEF2F2;
    --warn: #B45309; --warn-bg: #FFF7ED;
    --primary: #0D0C0A; --primary-contrast: #FFFFFF;
    --ring: rgba(67,56,202,.2); --focus-ring: rgba(67,56,202,.2);
    --shadow: 0 1px 3px rgba(0,0,0,.04), 0 14px 40px rgba(0,0,0,.09);
    --radius: 20px; --radius-sm: 12px;
    --toggleOff: #D6D3D1; --toggleKnob: #FFFFFF;
    --meter-bg: #E7E5DF; --meter-weak:#EF4444; --meter-mid:#F59E0B;
    --meter-strong:#16A34A; --meter-xstrong:#4338CA;
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
    background: var(--bg); color: var(--text);
    display: flex; flex-direction: column; align-items: center;
    padding: clamp(16px,3vw,26px) clamp(12px,3vw,18px);
    padding-top: calc(env(safe-area-inset-top,0px) + 20px);
    padding-bottom: calc(env(safe-area-inset-bottom,0px) + 28px);
    min-height: 100%;
  }
  /* STEPPER */
  .sn { width: min(680px,100%); margin: 0 auto 20px; display: flex; align-items: flex-start; }
  .sn-item { display:flex; flex-direction:column; align-items:center; gap:5px; flex:0 0 auto; }
  .sn-line { flex:1 1 0; height:2px; background:var(--border); margin-top:13px; border-radius:2px; min-width:6px; transition:background .35s; }
  .sn-line.done { background: var(--on); }
  .sn-bubble { width:28px; height:28px; border-radius:50%; background:var(--card); border:2px solid var(--border); display:grid; place-items:center; font-size:11px; font-weight:800; color:var(--muted); transition:all .3s; }
  .sn-item.done .sn-bubble { background:var(--on); border-color:var(--on); color:#fff; }
  .sn-item.active .sn-bubble { background:var(--accent); border-color:var(--accent); color:#fff; box-shadow:0 0 0 4px var(--accent-bg); }
  .sn-label { font-size:9.5px; font-weight:700; color:var(--muted); letter-spacing:.05em; text-align:center; white-space:nowrap; text-transform:uppercase; line-height:1; }
  .sn-item.done .sn-label, .sn-item.active .sn-label { color:var(--text); }
  @media (max-width:480px) { .sn-label{display:none} .sn-bubble{width:24px;height:24px;font-size:10px} .sn-line{margin-top:11px} }
  /* CARD */
  .card, .container { width:min(600px,100%); background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow); padding:24px 22px 28px; border:1px solid rgba(0,0,0,.04); }
  @media (max-width:560px) { .card, .container { padding:20px 16px 24px; } }
  /* TOP */
  .top { display:flex; align-items:center; gap:12px; margin-bottom:6px; }
  .back-btn { width:38px; height:38px; border-radius:999px; border:1.5px solid var(--border); background:var(--card); color:var(--text); display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; transition:background .15s; }
  .back-btn:hover { background:var(--bg); }
  .back-btn:focus-visible { outline:2px solid transparent; box-shadow:0 0 0 3px var(--ring); }
  /* TYPOGRAPHY */
  h1 { font-size:clamp(21px,4.5vw,26px); font-weight:800; letter-spacing:-.2px; margin:8px 0 6px; text-align:center; }
  h2 { font-size:clamp(18px,3.5vw,22px); font-weight:800; letter-spacing:-.1px; margin:0 0 8px; }
  .title { font-size:clamp(21px,4.5vw,26px); font-weight:800; letter-spacing:-.2px; margin:8px 0 6px; text-align:center; }
  .subtitle, .sub { text-align:center; color:var(--muted); margin:0 0 18px; font-size:14px; line-height:1.55; }
  /* FORM */
  .row, .form-row, .field-row { margin-bottom:14px; }
  label { display:block; font-size:11px; font-weight:700; color:var(--muted); margin-bottom:6px; letter-spacing:.08em; text-transform:uppercase; }
  input[type="text"], input[type="tel"], input[type="email"], input[type="password"], input[type="number"], input[type="time"], select, textarea {
    width:100%; height:46px; border-radius:var(--radius-sm); border:1.5px solid var(--border); background:var(--input-bg); padding:0 14px; font-size:15px; color:var(--text); font-family:inherit; outline:none; transition:border-color .15s, box-shadow .15s, background .15s; appearance:none;
  }
  input::placeholder, textarea::placeholder { color:#A8A29E; }
  input:focus, select:focus, textarea:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--ring); background:#fff; }
  input[aria-invalid="true"], select[aria-invalid="true"] { border-color:var(--danger); background:var(--danger-bg); }
  textarea { height:auto; padding:12px 14px; resize:vertical; }
  /* BUTTONS */
  .btn { width:100%; min-height:48px; border-radius:999px; border:none; background:var(--primary); color:var(--primary-contrast); font-family:inherit; font-size:14.5px; font-weight:800; letter-spacing:.03em; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; transition:opacity .15s, transform .1s; margin-top:8px; }
  .btn:hover:not([disabled]) { opacity:.9; }
  .btn:active:not([disabled]) { transform:scale(.99); }
  .btn[disabled] { opacity:.5; cursor:not-allowed; }
  .btn-primary { background:var(--primary); color:var(--primary-contrast); }
  .btn-ghost { background:var(--card); color:var(--text); border:1.5px solid var(--border); }
  .btn-ghost:hover { background:var(--bg); }
  .btn-secondary { background:var(--bg); color:var(--text); border:1.5px solid var(--border); }
  .btn-ok { background:var(--on); color:#fff; }
  .btn-row { display:flex; gap:10px; margin-top:14px; }
  .btn-row .btn { margin-top:0; }
  @media (max-width:440px) { .btn-row { flex-direction:column; } }
  /* TOAST */
  .toast { position:fixed; left:50%; bottom:24px; transform:translateX(-50%); background:#0D0C0A; color:#fff; padding:10px 20px; border-radius:999px; font-size:13.5px; font-weight:600; display:none; z-index:1000; white-space:nowrap; box-shadow:0 4px 20px rgba(0,0,0,.25); }
  .toast.show { display:block; animation:toastPop 2.4s ease both; }
  .toast.err { background:#DC2626; }
  @keyframes toastPop { 0%{opacity:0;transform:translate(-50%,10px)} 12%{opacity:1;transform:translate(-50%,0)} 88%{opacity:1} 100%{opacity:0;transform:translate(-50%,10px)} }


  .grid-2 { display:grid; grid-template-columns:160px 1fr; gap:10px; }
  @media (max-width:420px) { .grid-2 { grid-template-columns:1fr; } }
  .prefix { display:flex; align-items:center; gap:10px; height:46px; border-radius:var(--radius-sm); border:1.5px solid var(--border); background:var(--input-bg); padding:0 14px; }
  .prefix img { width:22px; height:16px; border-radius:2px; object-fit:cover; }
  .prefix span { font-weight:800; font-size:15px; letter-spacing:.3px; }
  .help { font-size:12px; color:var(--muted); margin-top:5px; }

  </style>
</head>
<body>
  <nav class="sn" aria-label="Kayıt adımları (7 adım)">
    <div class="sn-item done"><div class="sn-bubble"><i class="fa-solid fa-check" aria-hidden="true"></i></div><span class="sn-label">Şifre</span></div>
    <div class="sn-line done"></div>
    <div class="sn-item active" aria-current="step"><div class="sn-bubble">2</div><span class="sn-label">Profil</span></div>
    <div class="sn-line "></div>
    <div class="sn-item "><div class="sn-bubble">3</div><span class="sn-label">Adres</span></div>
    <div class="sn-line "></div>
    <div class="sn-item "><div class="sn-bubble">4</div><span class="sn-label">Saatler</span></div>
    <div class="sn-line "></div>
    <div class="sn-item "><div class="sn-bubble">5</div><span class="sn-label">Hizmetler</span></div>
    <div class="sn-line "></div>
    <div class="sn-item "><div class="sn-bubble">6</div><span class="sn-label">Personel</span></div>
    <div class="sn-line "></div>
    <div class="sn-item "><div class="sn-bubble">7</div><span class="sn-label">Bitiş</span></div>
  </nav>
<main class="card" role="main">
    <div class="top">
      <button class="back-btn" aria-label="Geri" id="btnBack" type="button"><i class="fa-solid fa-arrow-left"></i></button>
    </div>
    <h1>Hakkınızda</h1>
    <p class="subtitle">Kendiniz ve işletmeniz hakkında bize biraz daha bilgi verin.</p>

    <form id="aboutForm" class="form" autocomplete="off" novalidate>
      <div class="row">
        <label for="business">İŞLETME ADI</label>
        <input id="business" type="text" placeholder="Örn: X Kuaför" required
               inputmode="text" autocapitalize="words" autocomplete="organization" maxlength="80"/>
      </div>
      <div class="row">
        <label for="yourname">SALON SAHİBİ (Admin Adı)</label>
        <input id="yourname" type="text" placeholder="Ad Soyad" required
               inputmode="text" autocapitalize="words" autocomplete="name" maxlength="80"/>
      </div>
      <div class="row">
        <div class="grid-2">
          <div>
            <label>ÜLKE KODU</label>
            <div class="prefix"><img src="https://flagcdn.com/tr.svg" alt="TR bayrağı"/><span>+90</span></div>
          </div>
          <div>
            <label for="phone">TELEFON NUMARANIZ</label>
            <input id="phone" type="tel" placeholder="5xx xxx xx xx" required
                   inputmode="tel" autocomplete="tel-national" maxlength="14"/>
            <div class="help">Biçim: 5xx xxx xx xx</div>
          </div>
        </div>
      </div>
      <button class="btn" type="submit" id="submitBtn"><span>DEVAM ET</span></button>
    </form>
  </main>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script>
    const API_BASE = (window.API_BASE || "/api").replace(/\/+$/, "");
    const apiUrl = (path) => { if (!path.startsWith("/")) path = "/" + path; return API_BASE + path; };

    const K_FLOW   = "admin_onboarding_flow";
    const K_EMAIL  = "pending_admin_email";
    const K_METHOD = "admin_onboarding_method";
    const K_LAST   = "admin_onboarding_last_step";
    const K_TOTAL  = "admin_onboarding_total";
    const K_DATA   = "onboardingData";
    const TOTAL_STEPS = 7;

    function stepToHref(n){
      const s = Math.max(1, Math.min(TOTAL_STEPS, Number(n)||1));
      if (s <= 1) return "admin-register1.html";
      if (s === 2) return "admin-register2.html";
      if (s === 3) return "admin-register5.html";
      if (s === 4) return "admin-register6.html";
      if (s === 5) return "admin-register7.html";
      if (s === 6) return "admin-register8.html";
      return "admin-register9.html";
    }

    function getOnboardingData(){
      try { return JSON.parse(localStorage.getItem(K_DATA) || "{}"); } catch { return {}; }
    }
    function patchOnboardingData(patch){
      const next = { ...getOnboardingData(), ...patch };
      localStorage.setItem(K_DATA, JSON.stringify(next));
      return next;
    }

    const $ = (s,r=document)=>r.querySelector(s);
    const toast = $("#toast");
    const t = (v)=>String(v||"").trim().replace(/\s+/g," ");

    function showToast(msg, err=true){
      toast.textContent = msg;
      toast.className = "toast show" + (err?" err":"");
      setTimeout(()=>toast.classList.remove("show","err"), 2200);
    }

    function setLoading(btn, on=true, label="Kaydediliyor…"){
      if(!btn) return;
      btn.disabled = !!on;
      if(on){ btn.dataset._label = btn.innerHTML; btn.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin"></i> ${label}`; }
      else if(btn.dataset._label){ btn.innerHTML = btn.dataset._label; delete btn.dataset._label; }
    }

    const business = $("#business");
    const yourname = $("#yourname");
    const phone    = $("#phone");
    const submitBtn= $("#submitBtn");

    function maskPhone(v){
      const d=(v||"").replace(/\D/g,"").slice(0,10);
      let o="";
      if(d.length>0) o+=d.substring(0,3);
      if(d.length>3) o+=" "+d.substring(3,6);
      if(d.length>6) o+=" "+d.substring(6,8);
      if(d.length>8) o+=" "+d.substring(8,10);
      return o;
    }
    phone.addEventListener("input",e=> e.target.value=maskPhone(e.target.value));

    (function prefill(){
      const about = getOnboardingData()?.about || {};
      if(about.businessName) business.value = about.businessName;
      if(about.adminName) yourname.value = about.adminName;
      if(about.adminPhone) phone.value = maskPhone(String(about.adminPhone));
    })();

    let DIRTY=false;
    ["input","change"].forEach(ev=>{ document.getElementById("aboutForm").addEventListener(ev,()=>DIRTY=true,{capture:true}); });
    let allowLeave=false;
    window.addEventListener("beforeunload",e=>{ if(!allowLeave && DIRTY){ e.preventDefault(); e.returnValue=""; }});

    $("#btnBack").addEventListener("click",e=>{
      e.preventDefault(); allowLeave=true; location.replace("admin-register1.html");
    });

    function validateFields(){
      const nameBusiness = t(business.value).slice(0,80);
      const nameAdmin    = t(yourname.value).slice(0,80);
      const national     = phone.value.replace(/\D/g,"");
      business.value=nameBusiness; yourname.value=nameAdmin;
      const phoneValid = /^5\d{9}$/.test(national);
      business.setAttribute("aria-invalid", String(!nameBusiness));
      yourname.setAttribute("aria-invalid", String(!nameAdmin));
      phone.setAttribute("aria-invalid", String(!phoneValid));
      if(!nameBusiness || !nameAdmin){ showToast("Lütfen eksik alanları doldurun."); return {ok:false}; }
      if(!phoneValid){ showToast("Telefon numarası 5 ile başlayan 10 haneli olmalıdır."); return {ok:false}; }
      return { ok:true, nameBusiness, nameAdmin, national };
    }

    // Guard: sadece localStorage kontrolü - me.php çağrısı YOK
    function localGuard(){
      const flow  = (localStorage.getItem(K_FLOW)  || "").toLowerCase();
      const email = (localStorage.getItem(K_EMAIL) || "").trim();
      const method= (localStorage.getItem(K_METHOD)|| "").toLowerCase();
      const last  = Number(localStorage.getItem(K_LAST) || "0");

      if(flow!=="admin" || !email || !method){
        showToast("Akış geçersiz. Lütfen giriş yapın.", true);
        setTimeout(()=> location.replace("admin-register-login.html#login"), 300);
        return false;
      }
      if(!localStorage.getItem(K_TOTAL)) localStorage.setItem(K_TOTAL, String(TOTAL_STEPS));
      if(last < 2){ allowLeave=true; location.replace(stepToHref(1)); return false; }
      if(last > 2){ allowLeave=true; location.replace(stepToHref(last)); return false; }
      return true;
    }

    let IS_SUBMITTING=false;

    document.getElementById("aboutForm").addEventListener("submit", async (e)=>{
      e.preventDefault();
      if(IS_SUBMITTING) return;
      const v = validateFields();
      if(!v.ok) return;

      IS_SUBMITTING = true;
      setLoading(submitBtn, true, "Kaydediliyor…");

      try{
        // Bilgileri localStorage'a kaydet
        patchOnboardingData({
          about: {
            businessType: "kuafor",
            businessName: v.nameBusiness,
            adminName: v.nameAdmin,
            adminPhone: v.national
          }
        });

        // API'ye de kaydet (session varsa)
        try {
          await fetch(apiUrl("/admin/updateAbout.php"), {
            method: "POST",
            credentials: "include",
            headers: { "Content-Type":"application/json" },
            body: JSON.stringify({
              businessName: v.nameBusiness,
              ownerName: v.nameAdmin,
              phone: v.national
            })
          });
        } catch(apiErr) {
          console.warn("[updateAbout]", apiErr);
          // API hatası olsa bile devam et - localStorage'da var
        }

        localStorage.setItem(K_LAST, "3");
        allowLeave=true; DIRTY=false;
        location.replace("admin-register5.html");

      } catch(err){
        console.error("[step2]", err);
        showToast("Kaydedilemedi. Lütfen tekrar deneyin.");
        IS_SUBMITTING = false;
        setLoading(submitBtn, false);
      }
    });

    // Boot: sadece localStorage guard - me.php kontrolü KALDIRILDI
    (function boot(){
      const ok = localGuard();
      if(ok) setTimeout(()=> business.focus(), 80);
    })();
  </script>
</body>
</html>
