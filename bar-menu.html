<!-- bar-menu.html -->
<link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,400,0,0" />

<style>
  /* GENEL BAR AYARLARI */
  .app-bar {
    position: fixed;
    left: 0;
    top: 0;
    bottom: 0;
    width: 76px;
    background: #0f1115;
    border-right: 1px solid rgba(255, 255, 255, 0.04);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
  }

  .app-bar__list {
    list-style: none;
    margin: 0;
    padding: 12px 0;
    display: flex;
    flex-direction: column;
    gap: 16px;
    align-items: center;
    width: 100%;
  }

  .app-bar__item {
    --active-color: #111827;
    --icon-color: #9ca3af;
    --bg-hover: rgba(255, 255, 255, 0.05);

    width: 52px;
    height: 52px;
    border-radius: 999px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    color: var(--icon-color);
    background: transparent;
    transition:
      background 0.18s ease-out,
      color 0.18s ease-out,
      transform 0.12s ease-out,
      box-shadow 0.18s ease-out;
    cursor: pointer;
    position: relative;
  }

  .app-bar__item:hover {
    background: var(--bg-hover);
    transform: translateY(-1px);
  }

  .app-bar__item--active {
    color: #ffffff;
    background: var(--active-color);
    box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.06);
  }

  .app-bar__icon {
    font-size: 22px;
    line-height: 1;
  }

  .app-bar__label {
    margin-top: 4px;
    font-size: 10px;
    letter-spacing: 0.03em;
    text-transform: none;
    color: #e5e7eb;
  }

  /* Bildirim zili butonu — bar içinde */
  .app-bar__bell {
    width: 52px;
    height: 52px;
    border-radius: 999px;
    border: none;
    background: transparent;
    color: #9ca3af;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    position: relative;
    transition: background 0.18s, color 0.18s;
  }
  .app-bar__bell:hover { background: rgba(255,255,255,.05); color: #fff; }
  .app-bar__bell svg { width: 22px; height: 22px; }
  .app-bar__bell-label { margin-top: 4px; font-size: 10px; color: #e5e7eb; display: none; }

  /* Bell badge in bar */
  #barBellCount {
    position: absolute;
    top: 7px; right: 7px;
    min-width: 16px; height: 16px;
    border-radius: 50%;
    background: #ef4444;
    color: #fff;
    font-size: 9px;
    font-weight: 700;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 0 2px;
    line-height: 1;
    pointer-events: none;
  }
  #barBellCount.show { display: flex; }

  /* Ayırıcı çizgi */
  .app-bar__divider {
    width: 36px;
    height: 1px;
    background: rgba(255,255,255,.08);
    margin: 2px 0;
    flex-shrink: 0;
  }

  .material-symbols-rounded {
    font-variation-settings:
    'FILL' 0,
    'wght' 400,
    'GRAD' 0,
    'opsz' 24;
  }

  /* DESKTOP: sadece ikon */
  @media (min-width: 769px) {
    .app-bar__label { display: none; }
    body.has-app-bar { margin-left: 76px; }
  }

  /* MOBİL: altta yatay bar */
  @media (max-width: 768px) {
    .app-bar {
      top: auto;
      bottom: 0;
      left: 0;
      right: 0;
      width: 100%;
      height: 70px;
      border-right: none;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      padding: 0 8px;
      background: rgba(8, 9, 12, 0.96);
      backdrop-filter: blur(18px);
    }

    .app-bar__list {
      flex-direction: row;
      justify-content: space-around;
      align-items: center;
      gap: 4px;
      width: 100%;
    }

    .app-bar__item {
      width: auto;
      flex: 1;
      max-width: 80px;
      height: 56px;
      border-radius: 999px;
      padding: 4px 6px;
      background: transparent;
      box-shadow: none;
    }

    .app-bar__item--active { box-shadow: none; }
    .app-bar__icon { font-size: 20px; }
    .app-bar__label { display: block; font-size: 9px; }

    .app-bar__bell { flex: 1; max-width: 80px; height: 56px; padding: 4px 6px; border-radius: 999px; }
    .app-bar__bell-label { display: block; font-size: 9px; }
    .app-bar__divider { display: none; }

    body.has-app-bar { padding-bottom: 72px; }
  }
</style>

<nav class="app-bar">
  <ul class="app-bar__list">

    <!-- Takvim -->
    <li>
      <a href="calendar.html"
         class="app-bar__item"
         data-page="calendar"
         title="Takvim">
        <span class="app-bar__icon material-symbols-rounded">calendar_month</span>
        <span class="app-bar__label">Takvim</span>
      </a>
    </li>

    <!-- Personeller -->
    <li>
      <a href="staff.html"
         class="app-bar__item"
         data-page="staff"
         title="Personeller">
        <span class="app-bar__icon material-symbols-rounded">group</span>
        <span class="app-bar__label">Personel</span>
      </a>
    </li>

    <!-- Dükkan Ayarları -->
    <li>
      <a href="settings.html"
         class="app-bar__item"
         data-page="settings"
         title="Dükkan Ayarları">
        <span class="app-bar__icon material-symbols-rounded">store</span>
        <span class="app-bar__label">Dükkan</span>
      </a>
    </li>

    <!-- Ayırıcı -->
    <li class="app-bar__divider" aria-hidden="true"></li>

    <!-- Müşterilerim -->
    <li>
      <a href="musterilerim.html"
         class="app-bar__item"
         data-page="musterilerim"
         title="Müşterilerim">
        <span class="app-bar__icon material-symbols-rounded">people</span>
        <span class="app-bar__label">Müşteri</span>
      </a>
    </li>

    <!-- İstatistikler -->
    <li>
      <a href="istatistikler.html"
         class="app-bar__item"
         data-page="istatistikler"
         title="İstatistikler">
        <span class="app-bar__icon material-symbols-rounded">bar_chart</span>
        <span class="app-bar__label">İstatistik</span>
      </a>
    </li>

    <!-- Ayırıcı -->
    <li class="app-bar__divider" aria-hidden="true"></li>

    <!-- Admin Profil -->
    <li>
      <a href="admin-profile.html"
         class="app-bar__item"
         data-page="profile"
         title="Profil">
        <span class="app-bar__icon material-symbols-rounded">account_circle</span>
        <span class="app-bar__label">Profil</span>
      </a>
    </li>

    <!-- Bildirim Sayfası -->
    <li>
      <a href="bildirimler.html"
         class="app-bar__item"
         data-page="bildirimler"
         title="Bildirimler"
         id="barBellLink">
        <svg class="app-bar__icon" viewBox="0 0 24 24" aria-hidden="true" style="width:22px;height:22px;flex-shrink:0">
          <path d="M15 17h5l-1.4-1.4A2 2 0 0 1 18 14.2V11a6 6 0 1 0-12 0v3.2c0 .53-.21 1.04-.59 1.41L4 17h5m6 0a3 3 0 1 1-6 0m6 0H9"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
        <span id="barBellCount" class="bell-count" style="position:absolute;top:6px;right:6px">0</span>
        <span class="app-bar__label">Bildirim</span>
      </a>
    </li>

  </ul>
</nav>

<script>
  (function () {
    document.body.classList.add('has-app-bar');

    var bodyPage    = document.body.dataset.page;
    var fileName    = window.location.pathname.split('/').pop().split('?')[0];

    var pageKeyMap = {
      ''                  : 'calendar',
      'calendar.html'     : 'calendar',
      'staff.html'        : 'staff',
      'settings.html'     : 'settings',
      'admin-profile.html': 'profile',
      'musterilerim.html' : 'musterilerim',
      'istatistikler.html': 'istatistikler',
      'bildirimler.html'  : 'bildirimler',
    };

    var current = bodyPage || pageKeyMap[fileName] || fileName.replace('.html', '');

    document.querySelectorAll('.app-bar__item').forEach(function (link) {
      if (link.getAttribute('data-page') === current) {
        link.classList.add('app-bar__item--active');
      }
    });

    // barBellCount badge'ini bellCount ile senkronize et
    // (wb-notifications.js #bellCount'u günceller; biz bunu bar'a yansıtırız)
    function syncBarBell() {
      var bellCount   = document.getElementById('bellCount');
      var barBellCount = document.getElementById('barBellCount');
      if (!barBellCount) return;
      var n = bellCount ? parseInt(bellCount.textContent || '0') : 0;
      barBellCount.textContent = String(n);
      if (n > 0) barBellCount.classList.add('show');
      else       barBellCount.classList.remove('show');
    }

    // MutationObserver ile #bellCount değişimini izle
    var observer = new MutationObserver(syncBarBell);
    function startObserving() {
      var bellCount = document.getElementById('bellCount');
      if (bellCount) {
        observer.observe(bellCount, { characterData: true, subtree: true, childList: true });
      } else {
        setTimeout(startObserving, 500);
      }
    }
    startObserving();
  })();
</script>
