<html lang="tr">
<head>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- CSS (11.0.x) -->

  <!-- Erişilebilirlik + MODAL/NOTIFY/DRAWER için güvenli fallback -->
  <style>
    /* Görünüm popover tık göstergesi */
    .view-pop .view-item{
      display:flex; align-items:center; gap:6px;
    }
    .view-pop .view-item .right{
      margin-left:auto; opacity:0; transition:opacity .15s ease;
    }
    .view-pop .view-item.selected .right{opacity:1;}

    .sr-only{
      position:absolute !important; width:1px; height:1px; padding:0; margin:-1px;
      overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0;
    }

    /* ---- Güvenli fallback stilleri ---- */
    /* Bildirim paneli */
    .notify{
      position:fixed; inset:0 0 0 auto; width:min(420px, 92vw); max-width:420px;
      background:#fff; border-left:1px solid #e5e7eb; box-shadow:-16px 0 40px rgba(0,0,0,.12);
      transform:translateX(100%); transition:transform .22s ease; z-index:1200;
      display:flex; flex-direction:column
    }
    .notify.open{transform:translateX(0)}
    .notify-head{display:flex; align-items:center; justify-content:space-between; padding:14px 16px; font-weight:800; border-bottom:1px solid #e5e7eb}
    .notify-body{padding:14px; overflow:auto; height:100%}

    /* Drawer (Randevu paneli) */
    .drawer{
      position:fixed; inset:0 0 0 auto; width:min(520px, 96vw); max-width:520px; background:#fff;
      border-left:1px solid #e5e7eb; box-shadow:-22px 0 44px rgba(0,0,0,.12);
      transform:translateX(100%); transition:transform .22s ease; z-index:1300;
      display:flex; flex-direction:column
    }
    .drawer.open{transform:translateX(0)}
    .drawer-head{display:flex; align-items:center; justify-content:space-between; padding:16px; border-bottom:1px solid #e5e7eb}
    .drawer-body{padding:16px; overflow:auto; flex:1}
    .drawer-footer{padding:12px 16px; display:flex; gap:8px; border-top:1px solid #e5e7eb; flex-wrap:wrap}
    .btn{border-radius:10px; padding:10px 14px; font-weight:800; border:1px solid #e5e7eb; background:#f8fafc; cursor:pointer}
    .btn.primary{background:#4f46e5; color:#fff; border-color:#4f46e5}
    .btn.secondary{background:#eef2f7}
    .btn.danger{background:#ef4444; color:#fff; border-color:#ef4444}
    .btn.yes{background:#10b981; color:#fff; border-color:#10b981}
    .btn.no{background:#ef4444; color:#fff; border-color:#ef4444}

    /* v10.3+: JS’nin enjekte ettiği paletle uyumlu fallback sınıfları */
    .btn.approve{background:#10b981; color:#fff; border-color:#10b981}
    .btn.reject{background:#ef4444; color:#fff; border-color:#ef4444}
    .btn.detail{background:#e5e7eb; color:#111; border-color:#e5e7eb}
    .btn.cinfo{background:#dbeafe; color:#1e3a8a; border-color:#bfdbfe}

    /* Fallback: eski .sb-* müşteri modalı (customer-info.js yüklenmezse) */
    #customerModalWrap[aria-hidden="false"]{position:fixed; inset:0; display:block; z-index:1400; background:rgba(17,19,24,.48)}
    #customerModalWrap[aria-hidden="true"]{display:none}
    .sb-modal{position:fixed; inset:0; display:none; place-items:center}
    .sb-modal.open{display:grid}
    .sb-box{width:min(640px, 96vw); max-height:90vh; display:flex; flex-direction:column; background:#fff; border-radius:16px; box-shadow:0 20px 60px rgba(0,0,0,.25)}
    .sb-head{display:flex; align-items:center; justify-content:space-between; padding:16px; border-bottom:1px solid #e5e7eb}
    .sb-body{padding:16px; overflow:auto}
    .sb-foot{padding:12px 16px; display:flex; gap:8px; border-top:1px solid #e5e7eb; justify-content:flex-end}

    /* Mini takvim popover güvenliği */
    .center-pop{
      position:absolute; inset:auto auto auto 50%; transform:translateX(-50%);
      background:#fff; border:1px solid #e5e7eb; border-radius:14px;
      box-shadow:0 12px 32px rgba(0,0,0,.12); z-index:1100; display:none
    }
    .center-pop.open{display:block}

    /* Hafta görünümü: bir günde çok randevu geldiğinde gün içi scroll */
    .wk-col-inner{overflow:auto; padding:6px}
    .wk-col-inner.closed{overflow:hidden;}

    /* ── Bildirim Kartları ── */
    .noti-card{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:12px 14px;margin-bottom:8px;transition:box-shadow .15s}
    .noti-card.new{border-left:3px solid #0ea5b3}
    .noti-card.sys{border-left:3px solid #8b5cf6}
    .noti-hd{font-weight:700;font-size:13px;margin-bottom:3px}
    .noti-meta{font-size:11px;color:#6b7280;margin-bottom:4px}
    .noti-msg{font-size:13px;color:#374151;margin-bottom:8px;line-height:1.4}
    .noti-row{display:flex;justify-content:space-between;align-items:center}
    .noti-row .btns{display:flex;gap:6px;flex-wrap:wrap}
    .noti-row .btn.xs{padding:4px 10px;font-size:11px;font-weight:600;border-radius:6px;cursor:pointer;border:1px solid #d1d5db;background:#f9fafb;color:#374151;transition:all .15s}
    .noti-row .btn.xs.primary{background:#0ea5b3;color:#fff;border-color:#0ea5b3}
    .noti-row .btn.xs:hover{filter:brightness(0.93)}
    .notif-empty{color:#9ca3af;font-size:13px;text-align:center;padding:24px 0}
  </style>

      .app{display:none!important}

</head>

  <!-- Rail (bar-menu) yükleyici -->
  <script>
  (function loadRail(){
    const mount = document.getElementById('rail-mount');
    if(!mount) return;

    const CANDIDATES = [
      'bar-menu.html', '/bar-menu.html',
      'partials/bar-menu.html', '/partials/bar-menu.html',
      '../bar-menu.html'
    ];

    function ensureRailStyles(){
      const hasRuleHint = document.querySelector('[data-rail-style]') ||
        Array.from(document.styleSheets).some(ss=>{
          try { return Array.from((ss.cssRules||[])).some(r=>String(r.cssText).includes('.rail')); }
          catch { return false; }
        });
      if(hasRuleHint) return;

      const css = `
        .rail{position:fixed; inset:0 auto 0 0; width:72px; background:#151619; color:#b9bec7;
          display:flex; flex-direction:column; align-items:center; justify-content:space-between;
          z-index:1000; border-right:1px solid #2a2d34; padding:12px 0;}
        .rail__list{list-style:none; margin:0; padding:0; width:100%; flex:1; display:flex; flex-direction:column; justify-content:space-evenly; align-items:center}
        .rail__item{width:100%; display:flex; justify-content:center}
        .rail__btn{width:44px; height:44px; display:grid; place-items:center; border-radius:12px; color:#b9bec7; text-decoration:none; position:relative}
        .rail__btn:hover{background:#1d1f24; color:#fff}
        .rail__btn[aria-current="page"]{background:rgba(124,108,255,.12); color:#fff; box-shadow:inset 0 0 0 1px rgba(124,108,255,.35)}
        .main{ padding-left:72px; }
      `;
      const style = document.createElement('style');
      style.dataset.railStyle = '1';
      style.textContent = css;
      document.head.appendChild(style);
    }

    async function tryFetch(url){
      try{
        const r = await fetch(url, { credentials:'same-origin' });
        if(!r.ok) throw new Error('HTTP '+r.status);
        const html = await r.text();
        mount.innerHTML = html;
        mount.removeAttribute('aria-hidden');

        ensureRailStyles();

        // Takvim’i aktif işaretle
        const links = mount.querySelectorAll('.rail__btn, .rail a, nav a');
        let found = false;
        links.forEach(a=>{
          const href = (a.getAttribute('href')||'').split(/[?#]/)[0];
          if(/(^|\/)calendar\.html$/i.test(href)) {
            a.setAttribute('aria-current','page'); found = true;
          }
        });
        if(!found){
          const alt = mount.querySelector('[data-page="calendar"]');
          if(alt) alt.setAttribute('aria-current','page');
        }

        // Rail → Profil & Bildirim
        mount.querySelectorAll('#bmOpen, #topProfileBtn, [data-open="bm"]').forEach(btn=>{
          btn.addEventListener('click', (e)=>{
            e.preventDefault();
            const bm = document.getElementById('bmModal');
            bm?.classList.add('show');
            bm?.setAttribute('aria-hidden','false');
          });
        });
        mount.querySelectorAll('#railBell, [data-open="notify"]').forEach(btn=>{
          btn.addEventListener('click', (e)=>{
            e.preventDefault();
            document.getElementById('notify')?.classList.add('open');
          });
        });

        console.info('[rail] yüklendi:', url);
        return true;
      }catch(err){
        console.warn('[rail] yüklenemedi:', url, err);
        return false;
      }
    }

    (async ()=>{
      let ok = false;
      for(const u of CANDIDATES){
        ok = await tryFetch(u);
        if(ok) break;
      }
      if(!ok){
        mount.innerHTML = `
          <div class="rail">
            <ul class="rail__list">
              <li class="rail__item"><a class="rail__btn" href="calendar.html" aria-current="page" title="Takvim">📅</a></li>
              <li class="rail__item"><a class="rail__btn" href="staff.html" title="Personel">👤</a></li>
              <li class="rail__item"><a class="rail__btn avatar-btn" href="admin-profile.html" id="railProfileLink" title="Profil">👤</a></li>
            </ul>
          </div>`;
        mount.removeAttribute('aria-hidden');
        ensureRailStyles();
        console.error('[rail] hiçbir yoldan yüklenemedi.');
      }
    })();
  })();
  </script>

  <!-- ========== FAB Stilleri ========== -->
  <style>
    /* FAB ana buton */
    #fabWrap{
      position:fixed; bottom:28px; right:28px; z-index:1100;
      display:flex; flex-direction:column-reverse; align-items:flex-end; gap:12px;
    }
    .fab-main{
      width:56px; height:56px; border-radius:50%;
      background:linear-gradient(135deg,#4f46e5,#7c3aed);
      color:#fff; border:none; cursor:pointer;
      box-shadow:0 8px 24px rgba(79,70,229,.45);
      display:flex; align-items:center; justify-content:center;
      transition:transform .2s ease, box-shadow .2s ease;
    }
    .fab-main:hover{ transform:scale(1.08); box-shadow:0 12px 32px rgba(79,70,229,.55); }
    .fab-main.open{ transform:rotate(45deg); }
    .fab-main svg{ width:24px; height:24px; transition:transform .2s ease; }

    /* Sub-menü */
    .fab-menu{
      display:flex; flex-direction:column-reverse; gap:10px; align-items:flex-end;
      transform:translateY(12px); opacity:0; pointer-events:none;
      transition:transform .22s ease, opacity .22s ease;
    }
    .fab-menu.open{ transform:translateY(0); opacity:1; pointer-events:all; }
    .fab-opt{
      display:flex; align-items:center; gap:10px; padding:0;
      background:none; border:none; cursor:pointer;
    }
    .fab-opt-label{
      background:#fff; color:#111; font-weight:700; font-size:13px;
      padding:7px 14px; border-radius:999px;
      box-shadow:0 4px 16px rgba(0,0,0,.14);
      white-space:nowrap;
    }
    .fab-opt-icon{
      width:42px; height:42px; border-radius:50%; background:#fff;
      display:flex; align-items:center; justify-content:center;
      font-size:18px; box-shadow:0 4px 12px rgba(0,0,0,.12);
    }

    /* Modal overlay */
    .fab-overlay{
      position:fixed; inset:0; background:rgba(17,19,24,.48); z-index:1350;
      display:flex; align-items:center; justify-content:center;
      opacity:0; pointer-events:none; transition:opacity .2s ease;
    }
    .fab-overlay.open{ opacity:1; pointer-events:all; }
    .fab-modal{
      background:#fff; border-radius:18px;
      width:min(480px, 96vw); max-height:90vh;
      display:flex; flex-direction:column;
      box-shadow:0 24px 64px rgba(0,0,0,.22);
      transform:scale(.96); transition:transform .22s ease;
    }
    .fab-overlay.open .fab-modal{ transform:scale(1); }
    .fab-modal-head{
      display:flex; align-items:center; justify-content:space-between;
      padding:18px 20px; border-bottom:1px solid #e5e7eb;
    }
    .fab-modal-head h3{ font-size:16px; font-weight:800; margin:0; }
    .fab-modal-body{ padding:18px 20px; overflow-y:auto; display:flex; flex-direction:column; gap:14px; }
    .fab-modal-foot{ padding:14px 20px; border-top:1px solid #e5e7eb; display:flex; gap:10px; justify-content:flex-end; }

    /* FAB form fields */
    .fab-field{ display:flex; flex-direction:column; gap:5px; }
    .fab-field label{ font-size:12px; font-weight:700; color:#6b7280; text-transform:uppercase; letter-spacing:.04em; }
    .fab-field input,.fab-field select,.fab-field textarea{
      border:1.5px solid #e5e7eb; border-radius:10px; padding:9px 12px;
      font-size:14px; font-family:inherit; outline:none; background:#f9fafb;
      transition:border-color .15s;
    }
    .fab-field input:focus,.fab-field select:focus,.fab-field textarea:focus{
      border-color:#4f46e5; background:#fff;
    }
    .fab-field textarea{ resize:vertical; }
    .fab-row{ flex-direction:row !important; gap:12px; }
    .fab-row > div{ flex:1; display:flex; flex-direction:column; gap:5px; }
    .fab-row > div label{ font-size:12px; font-weight:700; color:#6b7280; text-transform:uppercase; letter-spacing:.04em; }
    .fab-row > div input{ width:100%; box-sizing:border-box; }


  </style>
